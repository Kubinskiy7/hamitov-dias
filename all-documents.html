<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <meta name="theme-color" content="#ffffff" />
  <title>Цифровые документы</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    }

    .app-wrapper {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      background: #ffffff;
      overflow: hidden;
    }

    /* ── Status bar spacer ── */
    .status-bar {
      height: env(safe-area-inset-top, 44px);
      background: #ffffff;
      flex-shrink: 0;
    }

    /* ── Nav bar ── */
    .nav-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      height: 44px;
      padding: 0 16px;
      position: relative;
      flex-shrink: 0;
    }

    .nav-back {
      position: absolute;
      left: 16px;
      display: flex;
      align-items: center;
      cursor: pointer;
      user-select: none;
      padding: 8px 4px;
    }

    .nav-back svg { width: 11px; height: 19px; }

    .nav-title {
      font-size: 17px;
      font-weight: 700;
      color: #000000;
      letter-spacing: -0.4px;
    }

    /* ── Scroll area ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 12px;
    }

    /* ── Page-specific: Цифровые документы ── */
    .page-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: #ffffff;
      padding: 0 16px;
    }

    .my-docs-title {
      font-size: 26px;
      font-weight: 700;
      color: #000000;
      letter-spacing: -0.4px;
      margin: 18px 0 14px;
    }

    .doc-list-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 14px 0;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .doc-list-row:active { opacity: 0.5; }

    .doc-list-icon {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1.5px solid #d6d6da;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .doc-list-icon svg { width: 22px; height: 22px; }

    .doc-list-text {
      flex: 1;
      font-size: 18px;
      font-weight: 400;
      color: #1c1c1e;
      letter-spacing: -0.2px;
    }

    .doc-list-chevron {
      flex-shrink: 0;
      width: 9px;
      height: 16px;
      opacity: 0.35;
    }
    /* ══════════ Page transition overlay (slide right→left) ══════════ */
    .page-slide-overlay {
      position: fixed;
      top: 0; left: 100%;
      width: 100%; height: 100%;
      background: #ffffff;
      z-index: 9000;
      transition: left 0.38s cubic-bezier(0.32, 0.72, 0, 1);
      pointer-events: none;
    }

    .page-slide-overlay.active {
      left: 0%;
      pointer-events: auto;
    }

    /* ══════════ Top loading bar (red, browser-style) ══════════ */
    .loading-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      width: 0%;
      background: #ff3b30;
      z-index: 9999;
      border-radius: 0 2px 2px 0;
      transition: width 0.42s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.18s;
      opacity: 0;
    }

    .loading-bar.show { opacity: 1; }
    .loading-bar.run  { width: 46%; }
    .loading-bar.hide { opacity: 0; }

    /* ══════════ Splash screen (egov + kaspi) ══════════ */
    .splash-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #ffffff;
      z-index: 9500;
      display: flex;
      flex-direction: column;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease;
    }

    .splash-screen.show {
      opacity: 1;
      pointer-events: auto;
    }

    .splash-status {
      height: env(safe-area-inset-top, 44px);
      flex-shrink: 0;
    }

    .splash-close-row {
      display: flex;
      justify-content: flex-end;
      padding: 6px 18px 0;
      flex-shrink: 0;
    }

    .splash-close {
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .splash-close svg { width: 17px; height: 17px; }

    .splash-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 0 24px;
    }

    .splash-custom-img {
      max-width: 280px;
      max-height: 220px;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .splash-fallback {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .splash-logo-circle {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .splash-logo-circle.egov {
      border: 1.5px solid #d6d6da;
      background: #ffffff;
    }

    .splash-logo-circle.egov svg { width: 56px; height: 30px; }

    .splash-logo-circle.kaspi {
      background: #ee4d2e;
    }

    .splash-logo-circle.kaspi svg { width: 52px; height: 52px; }

    .splash-plus {
      font-size: 26px;
      font-weight: 400;
      color: #c7c7cc;
      flex-shrink: 0;
    }

    .splash-footer {
      flex-shrink: 0;
      text-align: center;
      font-size: 15px;
      line-height: 1.55;
      color: #aeaeb2;
      padding: 0 40px;
      padding-bottom: calc(64px + env(safe-area-inset-bottom, 0px));
    }
  </style>
</head>
<body>

  <!-- Top red loading bar -->
  <div class="loading-bar" id="loadingBar"></div>

  <!-- Splash screen: egov + kaspi -->
  <div class="splash-screen" id="splashScreen">
    <div class="splash-status"></div>
    <div class="splash-close-row">
      <div class="splash-close" onclick="closeSplash()">
        <svg viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M1 1L16 16M16 1L1 16" stroke="#1c1c1e" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div class="splash-body">
      <img class="splash-custom-img" id="splashCustomImg" src="splash-logo.png" alt=""
        onerror="this.onerror=null; this.style.display='none'; document.getElementById('splashFallback').style.display='flex';" />
      <div class="splash-fallback" id="splashFallback" style="display:none;">
        <div class="splash-logo-circle egov">
          <svg viewBox="0 0 130 60" xmlns="http://www.w3.org/2000/svg">
            <text x="0" y="42" font-family="-apple-system, sans-serif" font-size="42" font-weight="800" fill="#3a4cc7">e</text>
            <circle cx="38" cy="35" r="6" fill="#3a4cc7"/>
            <path d="M35 35h6M38 32v6" stroke="#ffffff" stroke-width="1.6" stroke-linecap="round"/>
            <text x="48" y="42" font-family="-apple-system, sans-serif" font-size="42" font-weight="800" fill="#3a4cc7">gov</text>
          </svg>
        </div>
        <div class="splash-plus">+</div>
        <div class="splash-logo-circle kaspi">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <g fill="#ffffff">
              <ellipse cx="38" cy="34" rx="9" ry="9"/>
              <path d="M20 78c0-14 8-26 18-26s18 12 18 26z"/>
              <path d="M58 78l16-32c1.5-3 5-3.5 7-1 1.6 2 1.4 4.3 0 6.5L66 78z"/>
              <circle cx="78" cy="40" r="7"/>
            </g>
          </svg>
        </div>
      </div>
    </div>
    <div class="splash-footer">При поддержке Министерства<br/>цифрового развития</div>
  </div>

  <!-- Page slide overlay (covers screen during navigation) -->
  <div class="page-slide-overlay" id="pageSlideOverlay"></div>
<div class="app-wrapper">

  <div class="status-bar"></div>

  <!-- Nav bar -->
  <div class="nav-bar">
    <div class="nav-back" onclick="navigateBack('index.html')">
      <svg viewBox="0 0 11 19" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M9.5 17.5L1.5 9.5L9.5 1.5" stroke="#000000" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="nav-title">Цифровые документы</span>
  </div>

  <div class="page-body">

    <div class="my-docs-title">Мои документы</div>

    <!-- Удостоверение личности -->
    <div class="doc-list-row" onclick="navigateWithSplash('document.html')">
      <div class="doc-list-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="5" width="20" height="14" rx="2.5" stroke="#3c3c43" stroke-width="1.6"/>
          <rect x="5" y="9" width="3.5" height="3.5" rx="0.5" stroke="#3c3c43" stroke-width="1.4"/>
          <path d="M13 9h6M13 12h6M5 15.5h12" stroke="#3c3c43" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="doc-list-text">Удостоверение личности</span>
      <svg class="doc-list-chevron" viewBox="0 0 9 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1.5 1.5L7.5 8L1.5 14.5" stroke="#8e8e93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Водительские права -->
    <div class="doc-list-row" onclick="navigateWithSplash('license.html')">
      <div class="doc-list-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="5" width="20" height="14" rx="2.5" stroke="#3c3c43" stroke-width="1.6"/>
          <rect x="5" y="9" width="3.5" height="3.5" rx="0.5" stroke="#3c3c43" stroke-width="1.4"/>
          <circle cx="17.5" cy="14.5" r="2.6" stroke="#3c3c43" stroke-width="1.4"/>
          <path d="M13 9h6M13 12h2" stroke="#3c3c43" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="doc-list-text">Водительские права</span>
      <svg class="doc-list-chevron" viewBox="0 0 9 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1.5 1.5L7.5 8L1.5 14.5" stroke="#8e8e93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Студенческий билет -->
    <div class="doc-list-row" onclick="navigateWithSplash('student.html')">
      <div class="doc-list-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="18" height="18" rx="2.5" stroke="#3c3c43" stroke-width="1.6"/>
          <circle cx="12" cy="10" r="3" stroke="#3c3c43" stroke-width="1.5"/>
          <path d="M6 18c0-3 2.7-5 6-5s6 2 6 5" stroke="#3c3c43" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="doc-list-text">Студенческий билет</span>
      <svg class="doc-list-chevron" viewBox="0 0 9 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1.5 1.5L7.5 8L1.5 14.5" stroke="#8e8e93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <!-- Паспорт гражданина РК -->
    <div class="doc-list-row" onclick="navigateWithSplash('passport.html')">
      <div class="doc-list-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="9.5" stroke="#3c3c43" stroke-width="1.6"/>
          <ellipse cx="12" cy="12" rx="4" ry="9.5" stroke="#3c3c43" stroke-width="1.6"/>
          <path d="M2.5 12h19M3.7 7h16.6M3.7 17h16.6" stroke="#3c3c43" stroke-width="1.4"/>
        </svg>
      </div>
      <span class="doc-list-text">Паспорт гражданина РК</span>
      <svg class="doc-list-chevron" viewBox="0 0 9 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1.5 1.5L7.5 8L1.5 14.5" stroke="#8e8e93" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

  </div>

</div>

<script>
  // ═══════════ Page entrance animation ═══════════
  // If arriving via splash navigation, slide the new page in from the right
  (function() {
    const overlay = document.getElementById('pageSlideOverlay');
    if (sessionStorage.getItem('splashNav') === '1') {
      sessionStorage.removeItem('splashNav');
      overlay.classList.add('active');
      // force reflow then animate out
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          overlay.style.left = '100%';
        });
      });
      setTimeout(() => {
        overlay.classList.remove('active');
        overlay.style.left = '';
      }, 450);
    } else if (sessionStorage.getItem('backNav') === '1') {
      sessionStorage.removeItem('backNav');
      overlay.style.transition = 'none';
      overlay.style.left = '0%';
      overlay.classList.add('active');
      requestAnimationFrame(() => {
        overlay.style.transition = '';
        requestAnimationFrame(() => {
          overlay.style.left = '100%';
        });
      });
      setTimeout(() => {
        overlay.classList.remove('active');
        overlay.style.left = '';
      }, 450);
    }
  })();

  // ═══════════ Navigate with red loading bar + splash + slide ═══════════
  let splashTimer = null;

  function navigateWithSplash(targetUrl) {
    const bar = document.getElementById('loadingBar');
    const splash = document.getElementById('splashScreen');
    const overlay = document.getElementById('pageSlideOverlay');

    // 1. Slide white overlay in from right (covers current page)
    overlay.classList.add('active');

    // 2. Red loading bar grows
    bar.style.width = '0%';
    bar.classList.add('show');
    requestAnimationFrame(() => {
      bar.classList.add('run');
    });

    // 3. Shortly after, hide bar and show splash
    setTimeout(() => {
      bar.classList.remove('run');
      bar.classList.add('hide');
      splash.classList.add('show');
    }, 260);

    // 4. After splash is shown for a moment, navigate to target page
    splashTimer = setTimeout(() => {
      sessionStorage.setItem('splashNav', '1');
      window.location.href = targetUrl;
    }, 1500);
  }

  function closeSplash() {
    if (splashTimer) clearTimeout(splashTimer);
    const splash = document.getElementById('splashScreen');
    const overlay = document.getElementById('pageSlideOverlay');
    const bar = document.getElementById('loadingBar');

    splash.classList.remove('show');
    bar.classList.remove('show', 'run', 'hide');
    bar.style.width = '0%';

    // Slide overlay back out, revealing current (Госуслуги) page
    overlay.style.left = '100%';
    setTimeout(() => {
      overlay.classList.remove('active');
      overlay.style.left = '';
    }, 400);
  }

  // ═══════════ Back navigation (slide left→right, no splash) ═══════════
  function navigateBack(targetUrl) {
    const overlay = document.getElementById('pageSlideOverlay');
    overlay.style.transition = 'none';
    overlay.style.left = '-100%';
    overlay.classList.add('active');
    requestAnimationFrame(() => {
      overlay.style.transition = '';
      requestAnimationFrame(() => {
        overlay.style.left = '0%';
      });
    });
    sessionStorage.setItem('backNav', '1');
    setTimeout(() => {
      window.location.href = targetUrl;
    }, 380);
  }
</script>
</body>
</html>
